<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GREAT AK HOTEL</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0705; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }

  #back-btn {
    position: fixed;
    top: 28px;
    left: 32px;
    z-index: 100;
    font-family: 'Special Elite', cursive;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #F5EDD6;
    text-decoration: none;
    opacity: 0.7;
    transition: opacity 0.3s, color 0.3s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #back-btn::before {
    content: '←';
    font-size: 16px;
    color: #CC1111;
    text-shadow: 0 0 10px rgba(204,17,17,0.7);
  }
  #back-btn:hover {
    opacity: 1;
    color: #CC1111;
  }

  /* ── ENTER BUTTON ── */
  #enter-btn {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-family: 'Special Elite', cursive;
    font-size: 15px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #F5EDD6;
    background: none;
    border: none;
    padding: 14px 36px;
    cursor: pointer;
    transition: color 0.3s, text-shadow 0.3s;
    white-space: nowrap;
  }
  #enter-btn:hover {
    color: #fff;
    text-shadow: 0 0 18px rgba(255,255,255,0.4);
  }

  /* ── CURTAIN OVERLAY ── */
  #curtain-left, #curtain-right {
    position: fixed;
    top: 0;
    height: 100vh;
    z-index: 200;
    overflow: hidden;
    width: 0;
    transition: width 1.2s cubic-bezier(0.6,0,0.2,1);
  }
  #curtain-left  { left: 0; }
  #curtain-right { right: 0; }
  #curtain-left svg, #curtain-right svg {
    height: 100%;
    display: block;
  }

  /* ── FADE OVERLAY — behind curtains ── */
  #fade {
    position: fixed;
    inset: 0;
    z-index: 150;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s ease;
  }

  /* ── FADE FRONT — above curtains ── */
  #fade-front {
    position: fixed;
    inset: 0;
    z-index: 300;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.4s ease;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
</head>
<body>
<a id="back-btn" href="https://birdbrain1991.github.io/vault/">vault</a>
<button id="enter-btn">[ Enter Lodge ]</button>
<div id="fade"></div>
<div id="fade-front"></div>
<div id="curtain-left"></div>
<div id="curtain-right"></div>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;

  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x050203, 30, 75);

  // ── SKY GRADIENT ──
  const skyGeo = new THREE.SphereGeometry(80, 16, 8);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    vertexShader: `varying vec3 vPos; void main(){ vPos=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
    fragmentShader: `
      varying vec3 vPos;
      void main(){
        float t = clamp((vPos.y+10.)/65.,0.,1.);
        vec3 top    = vec3(0.12,0.03,0.18);  // deep violet
        vec3 hi     = vec3(0.45,0.08,0.30);  // magenta/pink
        vec3 mid    = vec3(0.75,0.28,0.06);  // burnt orange
        vec3 bot    = vec3(0.06,0.02,0.04);  // near black
        vec3 col;
        if(t>0.66)      col=mix(hi, top, (t-0.66)*3.0);
        else if(t>0.33) col=mix(mid, hi, (t-0.33)*3.0);
        else            col=mix(bot, mid, t*3.0);
        gl_FragColor=vec4(col,1.);
      }
    `
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  // ── CAMERA: schräg oben, zeigt viel von der Frontseite ──
  const camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.1, 200);
  camera.position.set(16, 16, 26);
  camera.lookAt(1, 1.5, -1);

  // ── MATERIALS ──
  const mRoof  = new THREE.MeshLambertMaterial({ color: 0x2C1506 });
  const mWall  = new THREE.MeshLambertMaterial({ color: 0xC8B89A });
  const mTrim  = new THREE.MeshLambertMaterial({ color: 0x7A4F2A });
  const mFnd   = new THREE.MeshLambertMaterial({ color: 0x3a3028 });
  const mGnd   = new THREE.MeshLambertMaterial({ color: 0x1E1A14 });
  const mPath  = new THREE.MeshLambertMaterial({ color: 0x5a5040 });
  const mWin   = new THREE.MeshLambertMaterial({ color: 0xDDEEFF, emissive: 0x6688CC, emissiveIntensity: 0.7 });
  const mDoor  = new THREE.MeshLambertMaterial({ color: 0x1a0e06 });
  const mChim  = new THREE.MeshLambertMaterial({ color: 0x4a3828 });
  const mTree  = new THREE.MeshLambertMaterial({ color: 0x0D1A08 });
  const mTrnk  = new THREE.MeshLambertMaterial({ color: 0x2a1a0a });

  function box(w,h,d,mat,x,y,z){
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
    m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; scene.add(m); return m;
  }

  // Gable roof — ridge along X, centered at (x,y,z)
  function roofX(w,h,d,mat,x,y,z){
    const s=new THREE.Shape();
    s.moveTo(-d/2,0); s.lineTo(0,h); s.lineTo(d/2,0); s.closePath();
    const geo=new THREE.ExtrudeGeometry(s,{depth:w,bevelEnabled:false});
    const m=new THREE.Mesh(geo,mat);
    m.rotation.y=Math.PI/2;
    // extrusion goes 0..w along local z; after rot90Y that's world -x..world -x+w
    // to centre at x: offset = x - w/2  ... but rotation flips sign, net: x+w/2 was wrong
    m.position.set(x-w/2, y, z);
    m.castShadow=true; scene.add(m); return m;
  }

  // Dormer: body + correctly centred mini-roof + window, base bottom at y
  function dormer(x,y,z,bw,bh,bd,rh){
    box(bw,bh,bd, mWall, x, y+bh/2, z);
    box(0.08,rh,bd, mWall, x-bw/2, y+bh+rh/2, z);
    box(0.08,rh,bd, mWall, x+bw/2, y+bh+rh/2, z);
    roofX(bw+0.15,rh,bd+0.15, mRoof, x, y+bh+0.48, z);
    box(bw*0.65,bh*0.6,0.08, mWin, x, y+bh*0.5, z-bd/2-0.01);
  }

  // ── GROUND & PATH ──
  const gnd=new THREE.Mesh(new THREE.PlaneGeometry(120,120),mGnd);
  gnd.rotation.x=-Math.PI/2; gnd.receiveShadow=true; scene.add(gnd);
  box(5,0.05,12, mPath, 1,  0.02, 9);
  box(12,0.05,4, mPath,-4,  0.02,14);

  // ════════════════════════════
  //  MAIN WING  cx=-5, cz=0
  // ════════════════════════════
  const MW=14, MD=6, MH=3.5, mx=-5, mz=0;
  const mfZ=mz-MD/2-0.06; // front face Z of main wing

  box(MW+0.4,0.4, MD+0.4, mFnd,  mx, 0.2,  mz);
  box(MW,    MH,  MD,     mWall, mx, 0.4+MH/2, mz);
  box(MW+0.1,0.18,MD+0.1, mTrim, mx, 0.4+MH-0.85, mz);
  roofX(MW+1.4,2.6,MD+1.6, mRoof, mx, 0.4+MH, mz);

  // FRONT WINDOWS — 4 flanking the door
  [-5.5,-2.8, 0.8, 3.5].forEach(dx=>{
    box(1.2,1.45,0.12,mWin, mx+dx,   0.4+1.85, mfZ);
    box(1.5,0.13,0.14,mTrim,mx+dx,   0.4+2.68, mfZ);
    box(1.5,0.13,0.14,mTrim,mx+dx,   0.4+1.10, mfZ);
  });

  // DOUBLE DOOR — centered at mx-0.9
  const dX=mx-0.9;
  box(2.6,2.5,0.13,mDoor, dX,  0.4+1.25, mfZ);
  box(0.14,2.5,0.16,mTrim,dX-1.3,0.4+1.25,mfZ);
  box(0.14,2.5,0.16,mTrim,dX+1.3,0.4+1.25,mfZ);
  box(2.8,0.14,0.16,mTrim,dX,  0.4+2.55, mfZ);
  box(2.0,0.50,0.10,mWin, dX,  0.4+2.82, mfZ); // transom
  // centre door divider
  box(0.10,2.5,0.10,mTrim,dX,  0.4+1.25, mfZ);

  // DORMERS — one per front window, sitting low on the roof slope
  [-5.5,-2.8,0.8,3.5].forEach(dx=>{
    dormer(mx+dx, 0.4+MH+0.1, mfZ+0.35, 1.4,0.9,0.75, 0.6);
  });

  box(0.65,2.2,0.65,mChim, mx+5, 0.4+MH+1.5, mz+0.5);

  // ════════════════════════════
  //  CONNECTOR WING
  // ════════════════════════════
  const CW=4,CD=5,CH=2.8,cx=4,cz=-0.3;
  box(CW+0.3,0.4,CD+0.3,mFnd, cx,0.2,cz);
  box(CW,CH,CD,mWall,cx,0.4+CH/2,cz);
  box(CW+0.1,0.14,CD+0.1,mTrim,cx,0.4+CH-0.7,cz);
  roofX(CW+1.0,2.0,CD+1.2,mRoof,cx,0.4+CH,cz);
  box(1.1,1.2,0.10,mWin,cx,0.4+1.7,cz-CD/2-0.05);

  // ════════════════════════════
  //  RIGHT WING  rx=10.5
  // ════════════════════════════
  const RW=10,RD=5.5,RH=3.2,rx=10.5,rz=-0.8;
  const rfZ=rz-RD/2-0.06;
  box(RW+0.4,0.4,RD+0.4,mFnd,rx,0.2,rz);
  box(RW,RH,RD,mWall,rx,0.4+RH/2,rz);
  box(RW+0.1,0.15,RD+0.1,mTrim,rx,0.4+RH-0.75,rz);
  roofX(RW+1.4,2.2,RD+1.4,mRoof,rx,0.4+RH,rz);

  [-3,0,3].forEach(dx=>{
    box(1.1,1.25,0.10,mWin, rx+dx,0.4+1.8,rfZ);
    box(1.35,0.13,0.13,mTrim,rx+dx,0.4+2.52,rfZ);
    box(1.35,0.13,0.13,mTrim,rx+dx,0.4+1.10,rfZ);
  });

  // side door right wing
  box(1.2,2.1,0.13,mDoor,rx-RW/2-0.07,0.4+1.05,rz-0.8);
  box(1.5,0.13,0.16,mTrim,rx-RW/2-0.07,0.4+2.18,rz-0.8);

  // dormers right wing
  [-2.5,2.5].forEach(dx=>{
    dormer(rx+dx, 0.4+RH+0.1, rfZ+0.35, 1.3,0.85,0.7, 0.55);
  });

  box(0.55,1.8,0.55,mChim,rx+3.5,0.4+RH+1.3,rz-0.3);

  // porch pillars right wing
  for(let i=0;i<4;i++){
    box(0.18,2.5,0.18,mTrim,rx-RW/2+0.9+i*1.5,0.4+1.25,rz+RD/2+0.5);
  }
  box(5.5,0.13,1.2,mRoof,rx-RW/2+3.2,0.4+2.6,rz+RD/2+0.5);

  // ── TREES ──
  function tree(x,z,h){
    const t=new THREE.Mesh(new THREE.CylinderGeometry(0.13,0.2,1.4,6),mTrnk);
    t.position.set(x,0.7,z); scene.add(t);
    for(let l=0;l<4;l++){
      const r=h*0.17*(1-l*0.16);
      const c=new THREE.Mesh(new THREE.ConeGeometry(r,h*0.29,7),mTree);
      c.position.set(x,1.4+l*h*0.21,z); c.castShadow=true; scene.add(c);
    }
  }
  tree(-16,-4,10); tree(-14,5,12); tree(-19,1,9); tree(-12,-3,8);
  tree(22,-2,11);  tree(20,6,8);   tree(24,3,13); tree(18,9,10);
  tree(4,-11,9);   tree(-3,-10,10); tree(10,-12,8);

  // organic dense treeline around horizon
  const forest = [
    // back row far
    [-32,-32,16],[-28,-31,14],[-24,-33,17],[-20,-30,13],[-16,-32,15],[-12,-31,18],[-8,-33,14],
    [-4,-30,16],[0,-32,15],[4,-31,17],[8,-33,13],[12,-30,16],[16,-32,14],[20,-31,17],[24,-33,15],[28,-30,16],[32,-32,13],
    // back row mid
    [-30,-26,12],[-26,-25,15],[-22,-27,13],[-18,-24,16],[-14,-26,12],[-10,-25,14],[-6,-27,16],
    [-2,-24,13],[2,-26,15],[6,-25,12],[10,-27,14],[14,-24,16],[18,-26,13],[22,-25,15],[26,-27,12],[30,-24,14],
    // left side
    [-32,-24,15],[-33,-18,13],[-31,-12,16],[-32,-6,14],[-33,0,17],[-31,6,13],[-32,12,15],[-33,18,12],[-31,24,16],
    [-27,-20,14],[-28,-10,12],[-26,-2,15],[-27,8,13],[-26,16,16],
    // right side
    [32,-22,14],[33,-16,16],[31,-8,13],[32,0,15],[33,8,12],[31,14,16],[32,20,14],[33,26,13],
    [27,-18,15],[28,-6,13],[26,2,16],[27,10,14],[28,18,12],[26,24,15],
    // front sides (flanking hotel)
    [-32,28,15],[-28,30,13],[-24,29,16],[-20,31,14],[-16,28,12],
    [16,30,14],[20,29,16],[24,31,13],[28,28,15],[32,30,12],
    // inner fill patches
    [-24,-18,11],[-20,-16,13],[-16,-19,10],[-12,-17,12],
    [22,-16,11],[24,-18,13],[26,-14,10],[20,-17,12],
    [-24,18,12],[-22,20,10],[24,16,11],[22,19,13],
    [-18,-22,10],[18,-22,11],[0,-22,12],[8,-20,10],[-8,-21,13],
  ];
  forest.forEach(([x,z,h]) => tree(x,z,h));

  // ── LIGHTING ──
  scene.add(new THREE.AmbientLight(0x0D0408, 1.0)); // near black ambient

  // main orange sun — bright key light on hotel
  const sun=new THREE.DirectionalLight(0xFF6622, 1.8);
  sun.position.set(18,14,16);
  sun.castShadow=true;
  sun.shadow.mapSize.set(2048,2048);
  sun.shadow.camera.left=-40; sun.shadow.camera.right=40;
  sun.shadow.camera.top=28;   sun.shadow.camera.bottom=-28;
  sun.shadow.camera.far=90;
  scene.add(sun);

  // pink/magenta fill from left
  const pink=new THREE.DirectionalLight(0xFF1177, 0.7);
  pink.position.set(-16,10,-6); scene.add(pink);

  // violet from above-back
  const violet=new THREE.DirectionalLight(0x6622CC, 0.5);
  violet.position.set(0,20,-15); scene.add(violet);

  // bright orange point light close to hotel front — fades with distance
  const hotelGlow=new THREE.PointLight(0xFF8833, 6.0, 20);
  hotelGlow.position.set(mx-1, 3.5, mz-3); scene.add(hotelGlow);

  // pink point on right wing
  const pinkGlow=new THREE.PointLight(0xFF2277, 5.0, 18);
  pinkGlow.position.set(rx, 3.0, rz-3); scene.add(pinkGlow);

  // violet haze near ground centre — fades fast
  const violetGlow=new THREE.PointLight(0x8833FF, 3.5, 14);
  violetGlow.position.set(3, 1.0, 2); scene.add(violetGlow);

  // window blue glow
  const wg1=new THREE.PointLight(0x6688FF, 1.0, 6);
  wg1.position.set(mx, 2.5, mz-4); scene.add(wg1);
  const wg2=new THREE.PointLight(0x6688FF, 0.7, 5);
  wg2.position.set(rx, 2.2, rz-4); scene.add(wg2);

  // ── RESIZE ──
  window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });

  renderer.render(scene,camera);
})();

// ── CURTAIN TRANSITION ──
function makeCurtainSVG(side) {
  const W = Math.ceil(window.innerWidth / 2) + 20;
  const H = window.innerHeight;
  const folds = 7;
  const foldW = W / folds;

  // fold shading gradients
  let defs = '';
  let foldRects = '';
  for (let i = 0; i < folds; i++) {
    const x = i * foldW;
    const light = i % 2 === 0;
    const id = `fold${side}${i}`;
    const c1 = light ? 210 : 140;
    const c2 = light ? 240 : 170;
    const c3 = light ? 180 : 110;
    defs += `<linearGradient id="${id}" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="rgb(${c1},${c1},${c1})"/>
      <stop offset="45%"  stop-color="rgb(${c2},${c2},${c2})"/>
      <stop offset="100%" stop-color="rgb(${c3},${c3},${c3})"/>
    </linearGradient>`;
    foldRects += `<rect x="${x}" y="0" width="${foldW}" height="${H}" fill="url(#${id})"/>`;
  }

  // vertical zigzag stripes across curtain
  const zW = 28;   // width of each zigzag column
  const zH = 20;   // tooth height
  let zigPaths = '';
  const cols = Math.ceil(W / zW) + 1;
  const rows = Math.ceil(H / zH) + 1;

  for (let col = 0; col < cols; col++) {
    const x = col * zW;
    let d = `M ${x} 0 `;
    for (let row = 0; row < rows; row++) {
      const y = row * zH;
      d += `L ${x + zW / 2} ${y + zH / 2} L ${x} ${y + zH} `;
    }
    // close stripe as filled shape
    const d2 = `M ${x} 0 ` + (() => {
      let s = '';
      for (let row = 0; row < rows; row++) {
        const y = row * zH;
        s += `L ${x + zW / 2} ${y + zH / 2} L ${x} ${y + zH} `;
      }
      return s;
    })() + `L ${x - zW / 2} ${H} ` + (() => {
      let s = '';
      for (let row = rows - 1; row >= 0; row--) {
        const y = row * zH;
        s += `L ${x - zW / 2} ${y + zH / 2} L ${x} ${y} `;
      }
      return s;
    })() + 'Z';
    zigPaths += `<path d="${d2}" fill="#000" fill-opacity="1"/>`;
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <defs>${defs}</defs>
    ${foldRects}
    ${zigPaths}
  </svg>`;
}

document.getElementById('enter-btn').addEventListener('click', () => {
  const cl        = document.getElementById('curtain-left');
  const cr        = document.getElementById('curtain-right');
  const fade      = document.getElementById('fade');
  const fadeFront = document.getElementById('fade-front');
  const hw        = Math.ceil(window.innerWidth / 2) + 20;

  cl.innerHTML = makeCurtainSVG('left');
  cr.innerHTML = makeCurtainSVG('right');
  cl.querySelector('svg').style.width = hw + 'px';
  cr.querySelector('svg').style.width = hw + 'px';

  requestAnimationFrame(() => {
    // curtains close
    cl.style.width = hw + 'px';
    cr.style.width = hw + 'px';
    // front fade starts simultaneously
    fadeFront.style.opacity = '1';
    fadeFront.style.pointerEvents = 'all';
  });

  // behind curtains: fade to black
  setTimeout(() => {
    fade.style.opacity = '1';
    fade.style.background = '#000';
    fade.style.pointerEvents = 'all';
  }, 400);

  // spooky maroon flicker behind curtains
  setTimeout(() => {
    fade.style.transition = 'background 0.15s ease';
    fade.style.background = '#3A0008';
  }, 1600);
  setTimeout(() => { fade.style.background = '#000'; }, 1750);
  setTimeout(() => { fade.style.background = '#6B0012'; }, 1900);
  setTimeout(() => { fade.style.background = '#1a0004'; }, 2100);
  setTimeout(() => {
    fade.style.background = '#8B0020';
    fade.style.transition = 'background 0.4s ease';
  }, 2300);

  setTimeout(() => {
    window.location.href = 'https://birdbrain1991.github.io/BlackGallery/';
  }, 3000);
});
</script>
</body>
</html>
